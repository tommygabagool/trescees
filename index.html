<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Get Quizzicle Trivia — 3 C's Tavern</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #111211; --bg2: #181a18; --bg3: #1f211f; --bg4: #262926;
  --border: rgba(74,200,92,0.15); --border2: rgba(74,200,92,0.3);
  --green: #4ac85c; --green2: #2e8a3c; --green-dim: rgba(74,200,92,0.12); --green-glow: rgba(74,200,92,0.08);
  --text: #e8ece8; --text2: #9aab9a; --text3: #5a6b5a;
  --gold: #f0b429; --silver: #b0bec5; --bronze: #cd8b5a;
  --font: 'Space Grotesk', sans-serif; --mono: 'Space Mono', monospace;
}
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
.dash { max-width: 960px; margin: 0 auto; padding: 28px 20px; }
.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
.header-left h1 { font-size: 24px; font-weight: 700; color: var(--green); letter-spacing: -0.5px; line-height: 1; }
.header-left .venue { font-size: 12px; color: var(--text2); margin-top: 5px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; }
.season-tabs { display: flex; gap: 6px; }
.tab { padding: 7px 16px; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: var(--font); transition: all 0.15s; }
.tab.active { background: var(--green); color: #0a1a0c; border-color: var(--green); }
.tab:hover:not(.active) { border-color: var(--border2); color: var(--text); }
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
@media (max-width: 600px) { .stat-row { grid-template-columns: repeat(2, 1fr); } }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-family: var(--mono); margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 700; color: var(--green); line-height: 1; font-family: var(--mono); }
.stat-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
.main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
@media (max-width: 700px) { .main-grid { grid-template-columns: 1fr; } }
.panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--green); font-family: var(--mono); }
.panel-body { padding: 12px; }
.lb-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 5px; margin-bottom: 3px; transition: background 0.1s; }
.lb-row:hover { background: var(--green-glow); }
.lb-rank { font-size: 13px; font-weight: 700; font-family: var(--mono); width: 22px; text-align: center; flex-shrink: 0; }
.rank-1 { color: var(--gold); } .rank-2 { color: var(--silver); } .rank-3 { color: var(--bronze); } .rank-other { color: var(--text3); }
.lb-medal { font-size: 14px; width: 18px; flex-shrink: 0; }
.lb-team { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-pts { font-size: 14px; font-weight: 700; color: var(--green); font-family: var(--mono); flex-shrink: 0; }
.lb-bar-wrap { width: 70px; flex-shrink: 0; }
.lb-bar-bg { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.lb-bar-fill { height: 4px; background: var(--green); border-radius: 2px; }
.week-selector { display: flex; flex-wrap: wrap; gap: 4px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
.wk-btn { padding: 3px 9px; font-size: 11px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: var(--mono); transition: all 0.12s; }
.wk-btn.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.wk-btn:hover:not(.active) { border-color: var(--border2); color: var(--text); }
.week-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.week-table th { padding: 6px 8px; text-align: left; color: var(--text3); font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); font-weight: 400; }
.week-table td { padding: 8px 8px; border-bottom: 1px solid rgba(74,200,92,0.06); }
.week-table tr:last-child td { border-bottom: none; }
.week-table tr:hover td { background: var(--green-glow); }
.rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 3px; font-size: 11px; font-weight: 700; font-family: var(--mono); }
.rb-1 { background: rgba(240,180,41,0.15); color: var(--gold); }
.rb-2 { background: rgba(176,190,197,0.15); color: var(--silver); }
.rb-3 { background: rgba(205,139,90,0.15); color: var(--bronze); }
.rb-o { background: var(--bg4); color: var(--text3); }
.score-high { color: var(--green); font-family: var(--mono); font-weight: 700; }
.score-mid { color: var(--text); font-family: var(--mono); font-weight: 700; }
.score-low { color: var(--text3); font-family: var(--mono); font-weight: 700; }
.trend-panel { margin-bottom: 20px; }
.trend-wrap { position: relative; width: 100%; height: 220px; padding: 16px 12px 0; }
.legend { display: flex; gap: 20px; flex-wrap: wrap; padding: 10px 16px 14px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); font-family: var(--mono); }
.legend-line { width: 20px; height: 3px; border-radius: 2px; display: inline-block; }
.footer { text-align: center; padding: 20px 0 10px; font-size: 11px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="dash">
  <div class="header">
    <div class="header-left">
      <h1>Get Quizzicle Trivia</h1>
      <div class="venue">3 C's Tavern &mdash; Seasonal Scoreboard</div>
    </div>
    <div class="season-tabs">
      <button class="tab" onclick="setSeason(1)">Season 1</button>
      <button class="tab active" onclick="setSeason(2)">Season 2</button>
    </div>
  </div>

  <div class="stat-row" id="stat-row"></div>

  <div class="main-grid">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Season Leaderboard</span>
        <span style="font-size:11px;color:var(--text3);font-family:var(--mono);">Championship pts</span>
      </div>
      <div class="panel-body" id="leaderboard-panel" style="padding:8px 6px;max-height:460px;overflow-y:auto;"></div>
    </div>
    <div class="panel">
      <div class="panel-header"><span class="panel-title">Weekly Results</span></div>
      <div class="week-selector" id="week-selector"></div>
      <div class="panel-body" id="weekly-panel" style="padding:8px;"></div>
    </div>
  </div>

  <div class="panel trend-panel">
    <div class="panel-header">
      <span class="panel-title">Score Trend — Top Teams</span>
      <span style="font-size:11px;color:var(--text3);font-family:var(--mono);" id="trend-subtitle"></span>
    </div>
    <div class="trend-wrap"><canvas id="trendChart"></canvas></div>
    <div class="legend" id="trend-legend"></div>
  </div>

  <div class="footer">Get Quizzicle Trivia &mdash; 3 C's Tavern &mdash; Season Dashboard</div>
</div>

};

let currentSeason = 2;
let currentWeek = null;
let chartInstance = null;

function setSeason(s) {
  currentSeason = s;
  currentWeek = null;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === s-1));
  render();
}

function render() {
  const d = DATA[currentSeason];
  renderStats(d.stats);
  renderLeaderboard(d.leaderboard);
  const firstWeek = Object.keys(d.weeks)[0];
  if (!currentWeek) currentWeek = firstWeek;
  renderWeekSelector(d);
  renderWeekly(d.weeks[currentWeek], currentWeek);
  renderTrend(d);
}

function renderStats(s) {
  document.getElementById('stat-row').innerHTML = `
    <div class="stat-card"><div class="stat-label">Nights Hosted</div><div class="stat-value">${s.events}</div><div class="stat-sub">trivia events</div></div>
    <div class="stat-card"><div class="stat-label">Unique Teams</div><div class="stat-value">${s.teams}</div><div class="stat-sub">season participants</div></div>
    <div class="stat-card"><div class="stat-label">Season Leader</div><div class="stat-value" style="font-size:15px;line-height:1.3;">${s.topTeam}</div><div class="stat-sub">${s.topPts} championship pts</div></div>
    <div class="stat-card"><div class="stat-label">Top Score</div><div class="stat-value">${s.bestScore}</div><div class="stat-sub">${s.bestTeam} &middot; ${s.bestWeek}</div></div>
  `;
}

function renderLeaderboard(lb) {
  const maxPts = lb[0].pts;
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('leaderboard-panel').innerHTML = lb.map((r,i) => {
    const pct = Math.round((r.pts / maxPts) * 100);
    const rankCls = i < 3 ? `rank-${i+1}` : 'rank-other';
    return `<div class="lb-row">
      <span class="lb-rank ${rankCls}">${i+1}</span>
      <span class="lb-medal">${medals[i] || ''}</span>
      <span class="lb-team">${r.team}</span>
      <div class="lb-bar-wrap"><div class="lb-bar-bg"><div class="lb-bar-fill" style="width:${pct}%"></div></div></div>
      <span class="lb-pts">${r.pts}</span>
    </div>`;
  }).join('');
}

function renderWeekSelector(d) {
  document.getElementById('week-selector').innerHTML = Object.keys(d.weeks).map(w =>
    `<button class="wk-btn ${w===currentWeek?'active':''}" onclick="selectWeek('${w}')">${w}</button>`
  ).join('');
}

function selectWeek(w) {
  currentWeek = w;
  document.querySelectorAll('.wk-btn').forEach(b => b.classList.toggle('active', b.textContent === w));
  renderWeekly(DATA[currentSeason].weeks[w], w);
}

function renderWeekly(teams, week) {
  if (!teams) return;
  const maxScore = Math.max(...teams.map(t => t.score));
  const rbCls = r => r===1?'rb-1':r===2?'rb-2':r===3?'rb-3':'rb-o';
  const sCls = s => s >= maxScore*0.85 ? 'score-high' : s >= maxScore*0.6 ? 'score-mid' : 'score-low';
  document.getElementById('weekly-panel').innerHTML = `
    <table class="week-table">
      <thead><tr><th>Rank</th><th>Team</th><th style="text-align:right">Score</th></tr></thead>
      <tbody>${teams.map(t=>`<tr>
        <td><span class="rank-badge ${rbCls(t.rank)}">${t.rank}</span></td>
        <td style="color:var(--text)">${t.team}</td>
        <td class="${sCls(t.score)}" style="text-align:right">${t.score}</td>
      </tr>`).join('')}</tbody>
    </table>`;
}

function renderTrend(d) {
  document.getElementById('trend-subtitle').textContent = `Top 3 teams · ${d.trendWeeks.length} weeks`;
  document.getElementById('trend-legend').innerHTML = d.trendTeams.map(t =>
    `<span class="legend-item"><span class="legend-line" style="background:${t.color}"></span>${t.name}</span>`
  ).join('');

  const canvas = document.getElementById('trendChart');
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  chartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels: d.trendWeeks,
      datasets: d.trendTeams.map(t => ({
        label: t.name,
        data: t.data,
        borderColor: t.color,
        backgroundColor: t.color + '20',
        borderWidth: 2,
        pointBackgroundColor: t.color,
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.3,
        spanGaps: true
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1f211f',
          borderColor: 'rgba(74,200,92,0.3)',
          borderWidth: 1,
          titleColor: '#9aab9a',
          bodyColor: '#e8ece8',
          padding: 10
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(74,200,92,0.07)' },
          ticks: { color: '#5a6b5a', font: { family: 'Space Mono', size: 11 }, autoSkip: false }
        },
        y: {
          grid: { color: 'rgba(74,200,92,0.07)' },
          ticks: { color: '#5a6b5a', font: { family: 'Space Mono', size: 11 } },
          min: 0
        }
      }
    }
  });
}

render();
</script>
</body>
</html>
