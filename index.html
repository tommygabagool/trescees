function Financials() {
  const [price, setPrice]       = useState(15);

  const [churn, setChurn]       = useState(5);
  const [tts,   setTts]         = useState(4.5);
  const [llm,   setLlm]         = useState(0.5);

  const vc         = tts + llm + 0.2;
  const margin     = price - vc;
  const overhead   = FIXED + freeU * FREE_COST;
  const be         = margin > 0 ? Math.ceil(overhead / margin) : Infinity;
  const ltv        = churn > 0 ? (margin / (churn / 100)) : 0;
  const pctMargin  = (margin / price * 100);

  const chartData = [10,25,50,100,150,200,300,500,750,1000].map(u => ({
    u: u >= 1000 ? `${u/1000}k` : String(u),

}

function Roadmap() {
  const [active, setActive] = useState(0);
  const phase = PHASES[active];
  const done = phase.items.filter(i => i.done).length;

  return (
    <div>
      <div style={{ display:'flex', gap:6, marginBottom:20, overflowX:'auto', WebkitOverflowScrolling:'touch', margin:'0 -16px 16px', padding:'0 16px 4px', scrollbarWidth:'none' }}>
        {PHASES.map((p,i) => (
          <button key={p.phase} onClick={() => setActive(i)} style={{
            padding:'8px 16px', fontSize:12, fontFamily:sans, whiteSpace:'nowrap',
            background: active===i ? p.color : 'transparent',
            color: active===i ? '#000' : T.muted,
            border:`1px solid ${active===i ? p.color : T.border}`,
            borderRadius:20, cursor:'pointer', fontWeight: active===i?600:400, flexShrink:0,
          }}>
            {p.phase}: {p.label}
          </button>
        ))}
      </div>

      <div style={{ ...s.card(), borderLeft:`4px solid ${phase.color}`, marginBottom:16 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div>
            <div style={{ fontSize:10, color:phase.color, textTransform:'uppercase', letterSpacing:'0.1em' }}>{phase.phase}</div>
            <div style={{ fontFamily:serif, fontSize:22, color:T.text, margin:'3px 0 2px' }}>{phase.label}</div>
          </div>
          <div style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:6, padding:'5px 11px', fontFamily:mono, fontSize:12, color:T.muted }}>{phase.time}</div>
        </div>
        <div style={{ marginTop:12, height:5, background:T.dim, borderRadius:3, overflow:'hidden' }}>
          <div style={{ height:'100%', background:phase.color, borderRadius:3, width:`${(done/phase.items.length)*100}%`, transition:'width 0.3s' }} />
        </div>
        <div style={{ textAlign:'right', fontSize:11, color:T.muted, marginTop:4 }}>{done}/{phase.items.length} complete</div>
      </div>

      <div style={{ display:'grid', gap:8 }}>
        {phase.items.map((item, ii) => (
          <div key={ii} style={{ ...s.card(), display:'flex', alignItems:'flex-start', gap:12, padding:'12px 14px' }}>
            <div style={{ width:22, height:22, borderRadius:'50%', border:`2px solid ${item.done ? phase.color : T.border}`,
              background: item.done ? phase.color : 'transparent', display:'flex', alignItems:'center',
              justifyContent:'center', flexShrink:0, marginTop:1 }}>
              {item.done && <span style={{ color:'#000', fontSize:12, fontWeight:800 }}>✓</span>}
            </div>
            <div style={{ fontSize:13, color: item.done ? T.muted : T.text, textDecoration: item.done ? 'line-through' : 'none', lineHeight:1.5, flex:1 }}>{item.t}</div>
            {item.done && <div style={{ fontSize:10, color:phase.color, flexShrink:0, marginTop:3 }}>Done</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

function Checklist() {
  const [checks, setChecks] = useState({});
  const done = Object.values(checks).filter(Boolean).length;
  const total = CHECKLIST.length;
  const allDone = done === total;

  return (
    <div>
      <div style={{ ...s.card({ borderTop:`2px solid ${allDone ? T.accent : T.amber}` }), marginBottom:20 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div>
            <div style={{ fontSize:15, fontWeight:600, color:T.text }}>Launch Readiness</div>
            <div style={{ fontSize:12, color:T.muted, marginTop:2 }}>All 6 must be true before charging anyone</div>
          </div>
          <div style={{ textAlign:'right' }}>
            <div style={{ fontFamily:mono, fontSize:30, color: allDone ? T.accent : T.amber, lineHeight:1 }}>{done}/{total}</div>
            <div style={{ fontSize:10, color:T.muted }}>criteria met</div>
          </div>
        </div>
        <div style={{ marginTop:12, height:6, background:T.dim, borderRadius:3, overflow:'hidden' }}>
          <div style={{ height:'100%', background: allDone ? T.accent : T.amber, borderRadius:3, width:`${(done/total)*100}%`, transition:'width 0.4s' }} />
        </div>
      </div>

      <div style={{ display:'grid', gap:10 }}>
        {CHECKLIST.map(item => {
          const isDone = checks[item.id];
          return (
            <div key={item.id}
              onClick={() => setChecks(c => ({ ...c, [item.id]: !c[item.id] }))}
              style={{ ...s.card(), cursor:'pointer', display:'flex', gap:14, alignItems:'flex-start',
                borderLeft:`3px solid ${isDone ? T.accent : T.border}`,
                background: isDone ? T.accentDim : T.card, transition:'all 0.2s',
                WebkitTapHighlightColor:'transparent', userSelect:'none' }}>
              <div style={{ width:26, height:26, borderRadius:7, border:`2px solid ${isDone ? T.accent : T.border}`,
                background: isDone ? T.accent : 'transparent', display:'flex', alignItems:'center',
                justifyContent:'center', flexShrink:0, marginTop:1, transition:'all 0.2s' }}>
                {isDone && <span style={{ color:'#000', fontSize:14, fontWeight:800 }}>✓</span>}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, color: isDone ? T.accent : T.text, fontWeight: isDone?600:400, marginBottom:3 }}>{item.t}</div>
                <div style={{ fontSize:12, color:T.muted }}>{item.d}</div>
              </div>
            </div>
          );
        })}
      </div>

      {allDone && (
        <div style={{ marginTop:16, ...s.card({ background:T.accentDim, border:`1px solid ${T.accent}`, textAlign:'center', padding:'22px 16px' }) }}>
          <div style={{ fontFamily:serif, fontSize:22, color:T.accent, marginBottom:6 }}>You're ready to launch. 🚀</div>
          <div style={{ fontSize:13, color:T.muted }}>All criteria met — go find your first subscriber.</div>
        </div>
      )}
    </div>
  );
}

      {/* ── Header ─────────────────────────────────────────────── */}
      <div style={{ background:T.surface, borderBottom:`1px solid ${T.border}`,

          <div style={{ fontFamily:serif, fontSize:18, color:T.accent, fontWeight:700, letterSpacing:'0.03em' }}>ThetaWire</div>

        </div>
        <div style={{ background:T.accentDim, border:`1px solid ${T.accent}33`, borderRadius:6,
          padding:'4px 10px', fontFamily:sans, fontSize:11, color:T.accent, letterSpacing:'0.05em' }}>
          {sectionTitles[nav]}

      {/* ── Content ────────────────────────────────────────────── */}
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch', padding:'20px 16px' }}>
        {nav === 'overview'    && <Overview />}
        {nav === 'market'      && <Market />}
        {nav === 'financials'  && <Financials />}
        {nav === 'projections' && <Projections />}

        <div style={{ height:`calc(env(safe-area-inset-bottom) + 80px)` }} />

          return (
            <button key={item.key} onClick={() => setNav(item.key)}

                gap:3, padding:'8px 4px', background:'none', border:'none', cursor:'pointer',
                color: active ? T.accent : T.muted, transition:'color 0.15s', minHeight:56 }}>
              <div style={{ lineHeight:1 }}>{Icons[item.key]}</div>
              <div style={{ fontFamily:sans, fontSize:9, letterSpacing:'0.05em', textTransform:'uppercase', fontWeight: active?600:400 }}>
                {item.label}
              </div>
              {active && <div style={{ width:4, height:4, borderRadius:'50%', background:T.accent, marginTop:1 }} />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
