<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#000000">
<meta name="supported-color-schemes" content="dark">
<title>Get Quizzicle Trivia • Season 1 • 3 C's Tavern</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=JetBrains+Mono:wght@400;600;700&family=Archivo+Black&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #000000;
  --bg-2: #000000;
  --bg-3: #0a0a0a;
  --panel: #050505;
  --line: #2a2a2a;
  --green: #00ff7f;
  --green-dim: #00b85c;
  --green-glow: rgba(0,255,127,0.35);
  --gold: #ffd60a;
  --silver: #e8e8e8;
  --bronze: #e89642;
  --text: #ffffff;
  --text-dim: #b0b0b0;
  --text-faint: #707070;
  --red: #ff5555;
}

- { box-sizing: border-box; margin: 0; padding: 0; }

html { background-color: #000000 !important; color-scheme: dark; }
body { background-color: #000000 !important; color: #ffffff; font-family: ‘Space Grotesk’, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

body::before {
content: ‘’; position: fixed; inset: 0; pointer-events: none; z-index: 0;
background:
radial-gradient(ellipse 800px 400px at 20% 0%, rgba(0,255,127,0.05), transparent),
radial-gradient(ellipse 600px 300px at 90% 100%, rgba(0,255,127,0.03), transparent);
}
body::after {
content: ‘’; position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.025;
background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.5) 2px, rgba(255,255,255,0.5) 3px);
}

.container { max-width: 1400px; margin: 0 auto; padding: 28px 24px 80px; position: relative; z-index: 2; }

/* === HEADER === */
.hero {
border: 1px solid var(–line);
background: linear-gradient(135deg, var(–bg-2), var(–bg));
padding: 32px 36px;
margin-bottom: 28px;
position: relative;
overflow: hidden;
}
.hero::before {
content: ‘’; position: absolute; top: 0; left: 0; right: 0; height: 3px;
background: linear-gradient(90deg, transparent, var(–green), transparent);
animation: scan 3s infinite;
}
@keyframes scan { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

.hero-inner { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 24px; }
.brand-stack { display: flex; flex-direction: column; gap: 6px; }
.tag {
font-family: ‘JetBrains Mono’, monospace; font-size: 11px; letter-spacing: 0.3em;
color: var(–green); text-transform: uppercase;
}
.tag::before { content: ’◢ ’; opacity: 0.7; }
h1 {
font-family: ‘Bungee’, sans-serif; font-size: clamp(2.4rem, 6vw, 4.8rem);
letter-spacing: -0.02em; line-height: 0.95; color: var(–text);
text-shadow: 0 0 40px rgba(0,255,127,0.2);
}
h1 .accent { color: var(–green); }
.subtitle { font-family: ‘JetBrains Mono’, monospace; font-size: 13px; color: var(–text-dim); margin-top: 4px; letter-spacing: 0.05em; }
.subtitle .pipe { color: var(–green); margin: 0 8px; }

.meta-strip { display: flex; gap: 18px; flex-wrap: wrap; font-family: ‘JetBrains Mono’, monospace; font-size: 11px; color: var(–text-faint); }
.meta-strip span { padding: 4px 10px; border: 1px solid var(–line); border-radius: 2px; }
.meta-strip strong { color: var(–green); font-weight: 600; }

/* === TABS === */
.tabs {
display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid var(–line);
overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(–line) transparent;
}
.tabs::-webkit-scrollbar { height: 4px; }
.tabs::-webkit-scrollbar-thumb { background: var(–line); }
.tab {
background: none; border: none; color: var(–text-dim); cursor: pointer;
padding: 14px 20px; font-family: ‘JetBrains Mono’, monospace; font-size: 12px;
letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.15s;
white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -1px;
position: relative;
}
.tab:hover { color: var(–text); }
.tab.active { color: var(–green); border-bottom-color: var(–green); }
.tab.active::after {
content: ‘’; position: absolute; inset: 0; background: var(–green);
opacity: 0.05; pointer-events: none;
}
.tab .num { color: var(–text-faint); margin-right: 6px; font-weight: 700; }
.tab.active .num { color: var(–green); }

/* === PANELS === */
.panel { display: none; padding-top: 32px; animation: fadeIn 0.35s ease-out; }
.panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* === STAT CARDS === */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 32px; }
.stat-card {
border: 1px solid var(–line); background: var(–panel); padding: 18px 20px;
position: relative; overflow: hidden; transition: all 0.2s;
}
.stat-card:hover { border-color: var(–green-dim); transform: translateY(-2px); }
.stat-card::before {
content: ‘’; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(–green);
transform: scaleY(0.3); transform-origin: top; transition: transform 0.3s;
}
.stat-card:hover::before { transform: scaleY(1); }
.stat-label {
font-family: ‘JetBrains Mono’, monospace; font-size: 10px; letter-spacing: 0.18em;
color: var(–text-faint); text-transform: uppercase; margin-bottom: 8px;
}
.stat-value {
font-family: ‘Archivo Black’, sans-serif; font-size: 22px; line-height: 1.1;
color: var(–text); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.02em;
}
.stat-sub { font-family: ‘JetBrains Mono’, monospace; font-size: 11px; color: var(–green); }

/* === SECTION HEADERS === */
.sec-h {
font-family: ‘Bungee’, sans-serif; font-size: 16px; letter-spacing: 0.05em;
color: var(–text); margin: 32px 0 18px; padding-bottom: 10px;
border-bottom: 1px solid var(–line); display: flex; align-items: center; gap: 12px;
}
.sec-h::before { content: ‘▸’; color: var(–green); font-size: 14px; }
.sec-h .count { font-family: ‘JetBrains Mono’, monospace; font-size: 11px; color: var(–text-faint); margin-left: auto; font-weight: 400; letter-spacing: 0.05em; }

/* === STANDINGS TABLE === */
.standings { border: 1px solid var(–line); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-family: ‘Space Grotesk’, sans-serif; }
thead { background: var(–bg-3); }
th {
text-align: left; padding: 12px 14px; font-family: ‘JetBrains Mono’, monospace;
font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
color: var(–text-dim); border-bottom: 1px solid var(–line); font-weight: 600;
}
th.num, td.num { text-align: right; }
th.center, td.center { text-align: center; }
tbody tr {
border-bottom: 1px solid var(–line); transition: background 0.12s;
}
tbody tr:hover { background: rgba(0,255,127,0.04); }
tbody tr:last-child { border-bottom: none; }
td { padding: 12px 14px; font-size: 14px; color: var(–text); }
.team-name { font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.rank-cell {
font-family: ‘Archivo Black’, sans-serif; font-size: 16px; width: 60px;
text-align: center; color: var(–text-dim);
}
.rank-1 { color: var(–gold); text-shadow: 0 0 12px rgba(255,214,10,0.5); }
.rank-2 { color: var(–silver); }
.rank-3 { color: var(–bronze); }
.rank-1::before { content: ‘🥇’; margin-right: 0; }
.rank-2::before { content: ‘🥈’; margin-right: 0; }
.rank-3::before { content: ‘🥉’; margin-right: 0; }
.rank-1, .rank-2, .rank-3 { font-size: 18px; }

.total-pts {
font-family: ‘JetBrains Mono’, monospace; font-weight: 700; color: var(–green);
}
.muted { color: var(–text-dim); font-family: ‘JetBrains Mono’, monospace; font-size: 13px; }

/* Top row glow */
tbody tr.top-row { background: linear-gradient(90deg, rgba(0,255,127,0.06), transparent 60%); }
tbody tr.top-row td { color: var(–text); }

/* === CHARTS === */
.chart-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
@media (min-width: 900px) { .chart-grid.two-col { grid-template-columns: 1fr 1fr; } }
.chart-box {
border: 1px solid var(–line); background: var(–panel); padding: 20px;
position: relative;
}
.chart-box .chart-title {
font-family: ‘JetBrains Mono’, monospace; font-size: 11px; letter-spacing: 0.15em;
color: var(–text-dim); text-transform: uppercase; margin-bottom: 4px;
}
.chart-box .chart-sub {
font-family: ‘Space Grotesk’, sans-serif; font-size: 18px; font-weight: 600;
color: var(–text); margin-bottom: 16px;
}
.chart-wrap { position: relative; height: 360px; }
.chart-wrap.tall { height: 580px; }

/* === WEEK PANEL === */
.week-meta {
display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 24px;
font-family: ‘JetBrains Mono’, monospace; font-size: 12px; color: var(–text-dim);
}
.week-meta strong { color: var(–green); font-weight: 600; }
.week-meta .divider { color: var(–text-faint); }

.score-cell { font-family: ‘JetBrains Mono’, monospace; color: var(–text-dim); font-size: 12px; }
.score-cell.has-val { color: var(–text); }
.score-cell.neg { color: var(–red); }

/* footer */
.footer {
margin-top: 48px; padding-top: 24px; border-top: 1px solid var(–line);
font-family: ‘JetBrains Mono’, monospace; font-size: 11px; color: var(–text-faint);
text-align: center; letter-spacing: 0.1em; text-transform: uppercase;
}
.footer .pulse { display: inline-block; width: 6px; height: 6px; background: var(–green); border-radius: 50%; margin: 0 8px; animation: pulse 1.5s infinite; vertical-align: middle; }
@keyframes pulse { 0%, 100% { opacity: 1; box-shadow: 0 0 8px var(–green); } 50% { opacity: 0.4; box-shadow: 0 0 0 var(–green); } }

/* mobile */
@media (max-width: 700px) {
.container { padding: 16px 12px 60px; }
.hero { padding: 22px 18px; }
th, td { padding: 10px 8px; font-size: 12px; }
th { font-size: 9px; }
.hide-sm { display: none; }
.tab { padding: 12px 14px; font-size: 11px; }
}
</style>

const fmt = (n) => n == null ? '—' : (Math.round(n * 10) / 10).toString();
const fmtNeg = (n) => n == null ? '—' : (n < 0 ? '−' + Math.abs(n) : n);
const UC = (s) => (s == null ? '' : String(s).toUpperCase());

/* ============== TABS ============== */
const tabs = document.getElementById('tabs');
const panels = document.getElementById('panels');

const tabDefs = [
  { id: 'dashboard', label: 'DASHBOARD', num: '00' },
  ...DATA.weeks.map((w, i) => ({ id: 'wk' + (i+1), label: w.label.toUpperCase(), num: String(i+1).padStart(2,'0') }))
];

tabDefs.forEach((t, i) => {
  const b = document.createElement('button');
  b.className = 'tab' + (i === 0 ? ' active' : '');
  b.dataset.target = t.id;
  b.innerHTML = `<span class="num">${t.num}</span>${t.label}`;
  b.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById(t.id).classList.add('active');
    if (t.id === 'dashboard') ensureCharts();
  });
  tabs.appendChild(b);
});

  let bestSingle = { team: '', score: -Infinity, week: '' };

    Object.entries(t.weekTotals).forEach(([wl, v]) => {
      if (v != null && v > bestSingle.score) bestSingle = { team: t.name, score: v, week: wl };
    });
  });

  // Most overtakes
  const mostOvertakes = [...DATA.teams].sort((a,b) => b.overtakes - a.overtakes)[0];

      </div>
      <div class="stat-card">
        <div class="stat-label">// Highest Single Week</div>
        <div class="stat-value">${bestSingle.team}</div>
        <div class="stat-sub">${fmt(bestSingle.score)} pts · ${bestSingle.week}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">// Most Overtakes</div>
        <div class="stat-value">${mostOvertakes.name}</div>
        <div class="stat-sub">+${mostOvertakes.overtakes} spots gained</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">// Title Race Margin</div>
        <div class="stat-value">${fmt(champ.total - runnerUp.total)} pts</div>
        <div class="stat-sub">${UC(champ.name.split(' ')[0])} over ${UC(runnerUp.name.split(' ')[0])}</div>
      </div>
    </div>

    <h2 class="sec-h">Current Standings <span class="count">${DATA.teams.length} teams</span></h2>
    <div class="standings">
      <table>
        <thead>
          <tr>
            <th class="center">Rank</th>
            <th>Team</th>
            <th class="num">Total</th>
            <th class="num hide-sm">Weeks</th>
            <th class="num hide-sm">Avg</th>
            <th class="num hide-sm">Best</th>
            <th class="num hide-sm">Overtakes</th>
          </tr>
        </thead>
        <tbody>
          ${DATA.teams.map((t, i) => {
            const r = i + 1;
            const rc = r <= 3 ? `rank-${r}` : '';
            const tr = r <= 3 ? 'top-row' : '';
            return `
              <tr class="${tr}">
                <td class="rank-cell ${rc}">${r}</td>
                <td class="team-name">${t.name}</td>
                <td class="num total-pts">${fmt(t.total)}</td>
                <td class="num hide-sm muted">${t.weeksPlayed}</td>
                <td class="num hide-sm muted">${fmt(t.avg)}</td>
                <td class="num hide-sm muted">${fmt(t.best)}</td>
                <td class="num hide-sm muted">+${t.overtakes}</td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <h2 class="sec-h">Cumulative Progression <span class="count">Top 8 teams</span></h2>
    <div class="chart-grid">
      <div class="chart-box">
        <div class="chart-title">// LINE</div>
        <div class="chart-sub">Running Total — Week by Week</div>
        <div class="chart-wrap"><canvas id="cumChart"></canvas></div>
      </div>
    </div>

    <h2 class="sec-h">Rank Progression <span class="count">Lower = better</span></h2>
    <div class="chart-grid">
      <div class="chart-box">
        <div class="chart-title">// MOVEMENT</div>
        <div class="chart-sub">Cumulative Rank — Top 8 by Week</div>
        <div class="chart-wrap"><canvas id="rankChart"></canvas></div>
      </div>
    </div>

    <h2 class="sec-h">Season Totals <span class="count">All teams</span></h2>
    <div class="chart-grid">
      <div class="chart-box">
        <div class="chart-title">// HORIZONTAL BAR</div>
        <div class="chart-sub">Total Points by Team</div>
        <div class="chart-wrap tall"><canvas id="totalsChart"></canvas></div>
      </div>
    </div>

    <h2 class="sec-h">Weekly Winners <span class="count">${DATA.weeklyWinners.length} weeks</span></h2>
    <div class="chart-grid two-col">
      <div class="chart-box">
        <div class="chart-title">// COLUMN</div>
        <div class="chart-sub">Winning Score per Week</div>
        <div class="chart-wrap"><canvas id="winnersChart"></canvas></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">// LIST</div>
        <div class="chart-sub">Week-by-Week Champions</div>
        <div style="max-height: 360px; overflow-y: auto;">
          <table>
            <thead><tr><th>Week</th><th>Champion</th><th class="num">Pts</th></tr></thead>
            <tbody>
              ${DATA.weeklyWinners.map((w, i) => `
                <tr>
                  <td class="muted">W${i+1} · ${w.week}</td>
                  <td class="team-name">${w.team}</td>
                  <td class="num total-pts">${fmt(w.score)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
  panels.appendChild(panel);
}

/* ============== WEEKLY PANELS ============== */
function buildWeekPanel(week, idx) {
  const panel = document.createElement('section');
  panel.className = 'panel';
  panel.id = 'wk' + (idx + 1);

  const winner = week.rows[0];
  const total = week.rows.reduce((s, r) => s + (r.total || 0), 0);
  const avg = total / week.rows.length;
  const margin = week.rows.length > 1 ? week.rows[0].total - week.rows[1].total : 0;

  const scoreKeys = ['R1','R2','R3','R4','R5','Bonus','POTW','QOD'];

  const renderScore = (v) => {
    if (v == null || v === '') return '<span class="score-cell">—</span>';
    const cls = v < 0 ? 'score-cell has-val neg' : 'score-cell has-val';
    return `<span class="${cls}">${fmtNeg(v)}</span>`;
  };

  panel.innerHTML = `
    <div class="week-meta">
      <span><strong>WEEK ${idx + 1}</strong></span>
      <span class="divider">/</span>
      <span>${week.label}</span>
      <span class="divider">/</span>
      <span><strong>${week.rows.length}</strong> teams</span>
      <span class="divider">/</span>
      <span>Winner: <strong>${winner.team}</strong> · ${fmt(winner.total)} pts</span>
      <span class="divider">/</span>
      <span>Margin: <strong>${fmt(margin)}</strong> pts</span>
      <span class="divider">/</span>
      <span>Avg: <strong>${fmt(avg)}</strong></span>
    </div>

    <div class="standings">
      <table>
        <thead>
          <tr>
            <th class="center">#</th>
            <th>Team</th>
            ${scoreKeys.map(k => `<th class="num hide-sm">${k}</th>`).join('')}
            <th class="num">Total</th>
          </tr>
        </thead>
        <tbody>
          ${week.rows.map((r, i) => {
            const rk = i + 1;
            const rc = rk <= 3 ? `rank-${rk}` : '';
            const tr = rk <= 3 ? 'top-row' : '';
            return `
              <tr class="${tr}">
                <td class="rank-cell ${rc}">${rk}</td>
                <td class="team-name">${r.team}</td>
                ${scoreKeys.map(k => `<td class="num hide-sm">${renderScore(r.scores[k])}</td>`).join('')}
                <td class="num total-pts">${fmt(r.total)}</td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
  panels.appendChild(panel);
}

/* ============== CHARTS ============== */
let chartsBuilt = false;
function ensureCharts() {
  if (chartsBuilt) return;
  chartsBuilt = true;
  buildCharts();
}

const PALETTE = ['#00ff7f','#ffd60a','#00bfff','#ff6b6b','#ffa500','#b266ff','#40e0d0','#ff69b4'];

const CHART_DEFAULTS = {
  color: '#8a958a',
  font: { family: "'JetBrains Mono', monospace", size: 11 },
};

function gridStyle() {
  return { color: 'rgba(255,255,255,0.05)', drawBorder: false };
}

function buildCharts() {
  Chart.defaults.color = CHART_DEFAULTS.color;
  Chart.defaults.font.family = CHART_DEFAULTS.font.family;
  Chart.defaults.font.size = CHART_DEFAULTS.font.size;

  const top8 = DATA.teams.slice(0, 8);

  // 1. Cumulative line chart
  new Chart(document.getElementById('cumChart'), {
    type: 'line',
    data: {
      labels: DATA.weekLabels,
      datasets: top8.map((t, i) => ({
        label: UC(t.name),
        data: DATA.weekLabels.map(wl => t.cumulative[wl]),
        borderColor: PALETTE[i],
        backgroundColor: PALETTE[i] + '20',
        borderWidth: 2.5,
        tension: 0.3,
        pointRadius: 3,
        pointHoverRadius: 6,
        pointBackgroundColor: PALETTE[i],
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { color: '#ffffff', font: { family: "'Space Grotesk', sans-serif", size: 12 }, boxWidth: 12, padding: 12 } },
        tooltip: { backgroundColor: '#000000', borderColor: '#00ff7f', borderWidth: 1, titleColor: '#00ff7f', bodyColor: '#ffffff', padding: 12 }
      },
      scales: {
        x: { grid: gridStyle(), ticks: { color: '#909090' } },
        y: { grid: gridStyle(), ticks: { color: '#909090' }, title: { display: true, text: 'TOTAL POINTS', color: '#909090', font: { size: 10, weight: '600' } } }
      }
    }
  });

  // 2. Rank progression (inverted Y)
  new Chart(document.getElementById('rankChart'), {
    type: 'line',
    data: {
      labels: DATA.weekLabels,
      datasets: top8.map((t, i) => ({
        label: UC(t.name),
        data: DATA.weekLabels.map(wl => t.cumRank[wl]),
        borderColor: PALETTE[i],
        backgroundColor: PALETTE[i] + '20',
        borderWidth: 2.5,
        tension: 0.2,
        pointRadius: 4,
        pointHoverRadius: 7,
        pointBackgroundColor: PALETTE[i],
        spanGaps: true,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { color: '#ffffff', font: { family: "'Space Grotesk', sans-serif", size: 12 }, boxWidth: 12, padding: 12 } },
        tooltip: { backgroundColor: '#000000', borderColor: '#00ff7f', borderWidth: 1, titleColor: '#00ff7f', bodyColor: '#ffffff', padding: 12 }
      },
      scales: {
        x: { grid: gridStyle(), ticks: { color: '#909090' } },
        y: { reverse: true, grid: gridStyle(), ticks: { color: '#909090', stepSize: 1 }, title: { display: true, text: 'RANK', color: '#909090', font: { size: 10, weight: '600' } }, min: 1 }
      }
    }
  });

  // 3. Total bar chart (horizontal)
  new Chart(document.getElementById('totalsChart'), {
    type: 'bar',
    data: {
      labels: DATA.teams.map(t => UC(t.name)),
      datasets: [{
        data: DATA.teams.map(t => t.total),
        backgroundColor: DATA.teams.map((_, i) => i === 0 ? '#ffd60a' : i === 1 ? '#d4d4d4' : i === 2 ? '#cd7f32' : '#00ff7f'),
        borderColor: 'transparent',
        borderRadius: 2,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#000000', borderColor: '#00ff7f', borderWidth: 1, titleColor: '#00ff7f', bodyColor: '#ffffff', padding: 12, callbacks: { label: (ctx) => ctx.parsed.x + ' pts' } }
      },
      scales: {
        x: { grid: gridStyle(), ticks: { color: '#909090' } },
        y: { grid: { display: false }, ticks: { color: '#ffffff', font: { family: "'Space Grotesk', sans-serif", size: 11 } } }
      }
    }
  });

  // 4. Weekly winners bar
  new Chart(document.getElementById('winnersChart'), {
    type: 'bar',
    data: {
      labels: DATA.weeklyWinners.map((w, i) => 'W' + (i+1)),
      datasets: [{
        data: DATA.weeklyWinners.map(w => w.score),
        backgroundColor: '#ffd60a',
        borderColor: 'transparent',
        borderRadius: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#000000', borderColor: '#ffd60a', borderWidth: 1,
          titleColor: '#ffd60a', bodyColor: '#ffffff', padding: 12,
          callbacks: {
            title: (ctx) => DATA.weeklyWinners[ctx[0].dataIndex].week,
            label: (ctx) => UC(DATA.weeklyWinners[ctx.dataIndex].team) + ' · ' + ctx.parsed.y + ' pts'
          }
        }
      },
      scales: {
        x: { grid: gridStyle(), ticks: { color: '#909090' } },
        y: { grid: gridStyle(), ticks: { color: '#909090' }, title: { display: true, text: 'POINTS', color: '#909090', font: { size: 10, weight: '600' } } }
      }
    }
  });
}

/* ============== INIT ============== */
buildDashboard();
DATA.weeks.forEach((w, i) => buildWeekPanel(w, i));
ensureCharts();
</script>
