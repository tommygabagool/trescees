// ── SVG Charts ───────────────────────────────────────────────────

function mkTicks(minV, maxV) {
  var range = maxV - minV || 1;
  var mag = Math.pow(10, Math.floor(Math.log10(range / 4)));
  var step = Math.ceil((range / 4) / mag) * mag;
  if (step === 0) step = 1;
  var ticks = [];
  var start = Math.ceil(minV / step) * step;
  for (var v = start; v <= maxV + step * 0.01; v += step) {
    ticks.push(Math.round(v));
  }
  return ticks;
}

function fmtY(v) {
  if (v >= 1000) return '$' + (v/1000) + 'k';
  if (v <= -1000) return '-$' + (Math.abs(v)/1000) + 'k';
  return '$' + v;
}

function LineChart(props) {
  var data = props.data, series = props.series, height = props.height || 180;
  var W = 300, H = height, pL = 46, pR = 8, pT = 8, pB = 22;
  var cW = W - pL - pR, cH = H - pT - pB, n = data.length;
  var allV = [];
  series.forEach(function(s) { data.forEach(function(d) { allV.push(d[s.key]); }); });
  var minV = Math.min.apply(null, [0].concat(allV));
  var maxV = Math.max.apply(null, allV);
  var range = maxV - minV || 1;
  function px(i) { return pL + (i / (n - 1)) * cW; }
  function py(v) { return pT + cH - ((v - minV) / range) * cH; }
  var ticks = mkTicks(minV, maxV);
  var skip = Math.ceil(n / 6);
  var children = [];
  ticks.forEach(function(v) {
    children.push(h('line', {key:'g'+v, x1:pL, x2:W-pR, y1:py(v), y2:py(v), stroke:C.dim, strokeWidth:.5, strokeDasharray:'3 3'}));
    children.push(h('text', {key:'t'+v, x:pL-4, y:py(v)+4, textAnchor:'end', fontSize:9, fill:C.muted, fontFamily:mono}, fmtY(v)));
  });
  if (minV < 0) {
    children.push(h('line', {key:'zero', x1:pL, x2:W-pR, y1:py(0), y2:py(0), stroke:C.muted, strokeWidth:1, strokeDasharray:'4 3'}));
  }
  data.forEach(function(d, i) {
    if (i % skip === 0) {
      children.push(h('text', {key:'x'+i, x:px(i), y:H-2, textAnchor:'middle', fontSize:9, fill:C.muted, fontFamily:sans}, d.m || ''));
    }
  });
  series.forEach(function(s) {
    var pts = data.map(function(d,i) { return px(i)+','+py(d[s.key]); }).join(' ');
    children.push(h('polyline', {key:'l'+s.key, points:pts, fill:'none', stroke:s.color, strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round', strokeDasharray:s.dashed?'6 3':null}));
    children.push(h('circle', {key:'d'+s.key, cx:px(n-1), cy:py(data[n-1][s.key]), r:3, fill:s.color}));
  });
  return h('svg', {viewBox:'0 0 '+W+' '+H, width:'100%', height:height, style:{display:'block',overflow:'visible'}}, children);
}

function BarChart(props) {
  var data = props.data, yKey = props.yKey, colorFn = props.colorFn, height = props.height || 180;
  var W = 300, H = height, pL = 46, pR = 8, pT = 8, pB = 22;
  var cW = W - pL - pR, cH = H - pT - pB, n = data.length;
  var allV = data.map(function(d) { return d[yKey]; });
  var minV = Math.min.apply(null, [0].concat(allV));
  var maxV = Math.max.apply(null, allV);
  var range = maxV - minV || 1;
  function py(v) { return pT + cH - ((v - minV) / range) * cH; }
  var zero = py(0);
  var barW = (cW / n) * 0.6;
  var ticks = mkTicks(minV, maxV);
  var skip = Math.ceil(n / 6);
  var children = [];
  ticks.forEach(function(v) {
    children.push(h('line', {key:'g'+v, x1:pL, x2:W-pR, y1:py(v), y2:py(v), stroke:C.dim, strokeWidth:.5, strokeDasharray:'3 3'}));
    children.push(h('text', {key:'t'+v, x:pL-4, y:py(v)+4, textAnchor:'end', fontSize:9, fill:C.muted, fontFamily:mono}, fmtY(v)));
  });
  children.push(h('line', {key:'zero', x1:pL, x2:W-pR, y1:zero, y2:zero, stroke:C.muted, strokeWidth:1}));
  data.forEach(function(d, i) {
    var v = d[yKey];
    var bx = pL + (i / n) * cW + (cW / n - barW) / 2;
    var by = v >= 0 ? py(v) : zero;
    var bh = Math.max(Math.abs(py(v) - zero), 1);
    children.push(h('rect', {key:'b'+i, x:bx, y:by, width:barW, height:bh, fill:colorFn(v), rx:2}));
    if (i % skip === 0) {
      children.push(h('text', {key:'x'+i, x:pL+(i/n)*cW+(cW/n)/2, y:H-2, textAnchor:'middle', fontSize:9, fill:C.muted, fontFamily:sans}, d.m || ''));
    }
  });
  return h('svg', {viewBox:'0 0 '+W+' '+H, width:'100%', height:height, style:{display:'block',overflow:'visible'}}, children);
}

function StackedBar(props) {
  var data = props.data, height = props.height || 180;
  var W = 300, H = height, pL = 46, pR = 8, pT = 8, pB = 22;
  var cW = W - pL - pR, cH = H - pT - pB, n = data.length;
  var maxV = Math.max.apply(null, data.map(function(d) { return d.free + d.paid; }));
  function py(v) { return pT + cH - (v / maxV) * cH; }
  var barW = (cW / n) * 0.6;
  var skip = Math.ceil(n / 6);
  var ticks = [0, Math.round(maxV * 0.5 / 100) * 100, maxV];
  var children = [];
  ticks.forEach(function(v) {
    children.push(h('line', {key:'g'+v, x1:pL, x2:W-pR, y1:py(v), y2:py(v), stroke:C.dim, strokeWidth:.5, strokeDasharray:'3 3'}));
    children.push(h('text', {key:'t'+v, x:pL-4, y:py(v)+4, textAnchor:'end', fontSize:9, fill:C.muted, fontFamily:mono}, v >= 1000 ? (v/1000)+'k' : String(v)}));
  });
  data.forEach(function(d, i) {
    var bx = pL + (i / n) * cW + (cW / n - barW) / 2;
    var fH = (d.free / maxV) * cH;
    var pH = (d.paid / maxV) * cH;
    children.push(h('rect', {key:'f'+i, x:bx, y:pT+cH-fH-pH, width:barW, height:fH, fill:C.dim}));
    children.push(h('rect', {key:'p'+i, x:bx, y:pT+cH-pH, width:barW, height:Math.max(pH,1), fill:C.accent, rx:2}));
    if (i % skip === 0) {
      children.push(h('text', {key:'x'+i, x:pL+(i/n)*cW+(cW/n)/2, y:H-2, textAnchor:'middle', fontSize:9, fill:C.muted, fontFamily:sans}, d.m || ''));
    }
  });
  return h('svg', {viewBox:'0 0 '+W+' '+H, width:'100%', height:height, style:{display:'block',overflow:'visible'}}, children);
}

  {id:'market',      label:'Market'},
  {id:'financials',  label:'Financials'},
  {id:'projections', label:'Forecast'},
  {id:'roadmap',     label:'Roadmap'},
  {id:'checklist',   label:'Launch'}
];

var SECTIONS = {
  overview:    Overview,
  market:      Market,
  financials:  Financials,
  projections: Projections,
  roadmap:     Roadmap,
  checklist:   Checklist
};

// ── App ──────────────────────────────────────────────────────────

function App() {
  var sn = useState('overview'); var nav = sn[0]; var setNav = sn[1];
  var scrollRef = useRef(null);
  useEffect(function() { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, [nav]);

  return h('div', {style:{display:'flex',flexDirection:'column',height:'100%',background:C.bg}},
    h('div', {style:{background:C.surface,borderBottom:'1px solid '+C.border,flexShrink:0,padding:'calc(env(safe-area-inset-top) + 10px) 16px 10px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
      h('div', null,
        h('div', {style:{fontFamily:serif,fontSize:18,color:C.accent,fontWeight:700}}, 'ThetaWire'),
        h('div', {style:{fontSize:10,color:C.muted}}, 'Business Plan 2025')
      ),
      h('div', {style:{background:C.accentDim,border:'1px solid '+C.accent+'33',borderRadius:6,padding:'4px 10px',fontSize:11,color:C.accent,fontFamily:sans}},
        NAV.find(function(n){return n.id===nav;}).label
      )
    ),
    h('div', {ref:scrollRef, style:{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:'20px 16px'}},
      h(SECTIONS[nav], null),
      h('div', {style:{height:'calc(env(safe-area-inset-bottom) + 74px)'}})
    ),
    h('div', {style:{background:C.surface,borderTop:'1px solid '+C.border,paddingBottom:'env(safe-area-inset-bottom)',display:'flex',flexShrink:0,zIndex:50}},
      NAV.map(function(item) {
        var active = nav === item.id;
        return h('button', {
          key:item.id,
          onClick:function(){setNav(item.id);},
          style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,padding:'8px 2px',background:'none',border:'none',minHeight:54,color:active?C.accent:C.muted,transition:'color 0.15s'}
        },
          h(Icon, {id:item.id, active:active}),
          h('div', {style:{fontFamily:sans,fontSize:9,letterSpacing:'0.04em',textTransform:'uppercase',fontWeight:active?600:400}}, item.label),
          active ? h('div', {style:{width:4,height:4,borderRadius:'50%',background:C.accent,marginTop:1}}) : null
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));

})();
</script>

</body>
